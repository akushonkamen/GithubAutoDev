# .cgao.yml — intake mode = confirm (DEFAULT)
# The clarifier prompts the user to confirm before an issue is created.
# This is the safest default and is appropriate for most repositories.
schema_version: 1
repo:
  name: cgao/intake-confirm-example
  default_branch: main
gates:
  spec_sha: true
  plan_sha: true
  approval_sha: true
  head_sha: true
  base_sha: true
runners:
  trusted_control:
    label: cgao-trusted-runner
  untrusted_code:
    label: cgao-untrusted-runner
intake:
  enabled: true
  mode: confirm
  sources:
    lark:
      enabled: true
      triggers:
        at_bot_only: true
        explicit_keywords: [建issue, 提需求, 记录, bug, 需求]
      llm:
        confidence_threshold: 0.75
        max_clarify_rounds: 5
    wecom:
      enabled: true
      triggers:
        at_bot_only: true
        explicit_keywords: [建issue, 提需求, 记录, bug, 需求]
      llm:
        confidence_threshold: 0.75
        max_clarify_rounds: 5
  dedup:
    window_minutes: 1440
    key: [source_type, external_id, content_hash]
  rate_limit:
    max_llm_calls_per_repo_per_hour: 60
  security:
    redact_before_llm: true
    untrusted_envelope: true
    reject_external_links: true
